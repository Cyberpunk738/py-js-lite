<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="pyjs-lite — Write Python, Run JavaScript. A lightweight transpiler playground.">
  <title>pyjs-lite — Python → JavaScript Playground</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CodeMirror 6 via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-ocean.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header id="app-header">
    <div class="header-content">
      <div class="logo-group">
        <div class="logo-icon">
          <span class="logo-py">Py</span><span class="logo-js">JS</span>
        </div>
        <div class="logo-text">
          <h1>pyjs-lite</h1>
          <p class="tagline">Write Python. Run JavaScript.</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-examples" class="btn btn-ghost" title="Load example">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Examples
        </button>
        <a href="https://github.com" target="_blank" class="btn btn-ghost" id="btn-github" title="View on GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ═══ Main Playground ═══ -->
  <main id="playground">

    <!-- Editor Panel -->
    <section class="panel panel-editor" id="panel-editor">
      <div class="panel-header">
        <div class="panel-tab active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Python Input
        </div>
        <div class="panel-actions">
          <button id="btn-clear" class="btn-icon" title="Clear editor">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="editor-wrapper" id="editor-input"></div>
    </section>

    <!-- Center Controls -->
    <div class="controls-center" id="controls-center">
      <button id="btn-run" class="btn btn-run" title="Transpile & Run (Ctrl+Enter)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Run</span>
      </button>
      <button id="btn-transpile" class="btn btn-transpile" title="Transpile only">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        <span>Transpile</span>
      </button>
    </div>

    <!-- Output Panel -->
    <section class="panel panel-output" id="panel-output">
      <div class="panel-header">
        <div class="panel-tabs">
          <button class="panel-tab active" data-tab="output" id="tab-output">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            Output
          </button>
          <button class="panel-tab" data-tab="js" id="tab-js">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            JavaScript
          </button>
        </div>
        <div class="panel-actions">
          <button id="btn-copy" class="btn-icon" title="Copy output">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="output-content" id="output-console" style="display: block;">
        <div class="output-placeholder" id="output-placeholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <p>Click <strong>Run</strong> to see output</p>
        </div>
      </div>
      <div class="output-content" id="output-js" style="display: none;"></div>
    </section>

  </main>

  <!-- ═══ Examples Dropdown ═══ -->
  <div class="examples-dropdown" id="examples-dropdown">
    <div class="examples-header">
      <span>📘 Load Example</span>
      <button id="btn-close-examples" class="btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="examples-list" id="examples-list"></div>
  </div>

  <!-- ═══ Toast Notifications ═══ -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ═══ Footer ═══ -->
  <footer id="app-footer">
    <p>pyjs-lite v1.0 — Regex-powered Python → JS transpiler</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
